<script>
        // ⚡ Absolute Production Mappings - Explicitly tied to your repository link
        const BASE_URL = 'https://rgoghcdckealecqxrpwl.supabase.co'; 
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdWJhc2FzZSIsInJlZiI6InJnb2doY2Rja2VhbGVjcXhycHdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1OTAzMTUsImV4cCI6MjA5ODE2NjMxNX0.e6CXQZXfEeRfWtZF9GfXSDITrsQb3GtPT-uUnxeE1iU';
        const EXPLICIT_PORTAL_REDIRECT = 'https://jreebuman.github.io/lab-system/labos-portal.html';

        let appState = { clinicName: '', themeColor: '#2563eb', currency: '', locations: [], services: [], staffRecords: [], patientRecords: [] };

        // 🚀 BULLETPROOF WEB API FETCH ROUTING FOR LOGIN
        async function attemptAdminLogin() {
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-pass').value;
            const errEl = document.getElementById('admin-login-error');

            if(!email || !password) { errEl.textContent = "⚠ Fill out fields."; errEl.classList.remove('hidden'); return; }

            try {
                const response = await fetch(`${BASE_URL}/auth/v1/token?grant_type=password&apikey=${ANON_KEY}`, {
                    method: 'POST',
                    headers: {
                        'apikey': ANON_KEY,
                        'Authorization': `Bearer ${ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errEl.textContent = `⚠ ${data.error_description || data.message || 'Authentication failed'}`;
                    errEl.classList.remove('hidden');
                    return;
                }

                if (data.user?.user_metadata?.role === 'admin') {
                    errEl.classList.add('hidden');
                    document.getElementById('admin-login-screen').classList.add('hidden');
                    document.getElementById('app-layout').classList.remove('hidden');
                    loadInitialSetupState();
                } else {
                    errEl.textContent = "⚠ Access Denied: Profile is missing the Admin role flag.";
                    errEl.classList.remove('hidden');
                }
            } catch (err) {
                errEl.textContent = "⚠ Connection timeout or network blockade.";
                errEl.classList.remove('hidden');
            }
        }

        // 🚀 BULLETPROOF WEB API FETCH ROUTING FOR STAFF INVITES
        async function triggerStaffInvitation() {
            const name = document.getElementById('staff-name').value.trim();
            const email = document.getElementById('staff-email').value.trim();
            const role = document.getElementById('staff-role').value;

            if(!name || !email) { showToast('Complete inputs'); return; }

            try {
                const response = await fetch(`${BASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: {
                        'apikey': ANON_KEY,
                        'Content-Type': 'application/json',
                        'X-Client-Info': 'supabase-js/2.0.0'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: 'TemporaryPasscode123!',
                        options: {
                            emailRedirectTo: EXPLICIT_PORTAL_REDIRECT,
                            data: { full_name: name, role: role, clinic_name: appState.clinicName || 'LabOS Space' }
                        }
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showToast(`Error: ${data.message || 'Invite creation failed'}`);
                } else {
                    showToast(`Invite processed straight to Mailtrap Sandbox!`);
                    appState.staffRecords.push({ name, email, role, status: 'Invite Dispatched' });
                    saveClinicSetup();
                    renderStaffList();
                }
            } catch (err) {
                showToast("Network request crashed.");
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn w-full text-left px-3 py-2.5 rounded-lg font-medium text-sm text-slate-300 hover:bg-slate-700");
            document.getElementById('tab-' + tabId).className = "tab-btn w-full text-left px-3 py-2.5 rounded-lg font-bold text-sm text-white bg-slate-700";
            ['analytics', 'branding', 'catalog', 'staff'].forEach(id => document.getElementById('content-' + id).classList.add('hidden'));
            document.getElementById('content-' + tabId).classList.remove('hidden');
        }

        function showToast(text) {
            const toast = document.createElement('div');
            toast.className = "p-3 text-xs font-bold rounded-lg text-white bg-emerald-600";
            toast.textContent = text; document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function logoutAdmin() {
            document.getElementById('app-layout').classList.add('hidden');
            document.getElementById('admin-login-screen').classList.remove('hidden');
        }
        function renderStaffList() {
            document.getElementById('staff-list-bag').innerHTML = appState.staffRecords.map(s => `<div class="p-3 bg-slate-50 border rounded-xl flex justify-between items-center text-xs"><div><p class="font-bold text-slate-800">${s.name} <span class="text-slate-400 font-normal">(${s.email})</span></p><p class="text-blue-600 uppercase font-black tracking-wider mt-0.5">${s.role}</p></div><span class="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded font-bold">${s.status}</span></div>`).join('');
        }
        function saveClinicSetup() {
            appState.clinicName = document.getElementById('setup-name').value.trim() || 'LabOS Space';
            appState.themeColor = document.getElementById('setup-color').value;
            appState.currency = document.getElementById('setup-currency').value.toUpperCase().trim() || 'USD';
            localStorage.setItem('labos_tenant_config', JSON.stringify(appState));
            showToast('Configurations synchronized.');
        }
        function loadInitialSetupState() {
            const cached = localStorage.getItem('labos_tenant_config');
            if(cached) { try { appState = JSON.parse(cached); } catch(e) {} }
            document.getElementById('setup-name').value = appState.clinicName || '';
            document.getElementById('setup-color').value = appState.themeColor || '#2563eb';
            document.getElementById('setup-currency').value = appState.currency || '';
            renderStaffList();
        }
    </script>
